quarkus:
  datasource:
    db-kind: postgresql
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    jdbc:
      url: "jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}"
omgcluster:
  init:
    version: ${INIT_VERSION}
  server:
    group: ${SERVER_GROUP}
    address:
      internal: ${INTERNAL_ADDRESS}
      external: ${EXTERNAL_ADDRESS}
