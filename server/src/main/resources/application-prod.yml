quarkus:
  datasource:
    db-kind: postgresql
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    jdbc:
      url: "jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}"
  redis:
    hosts: ${REDIS_HOSTS}
omgcluster:
  init:
    version: ${INIT_VERSION}
  node:
    name: ${HOSTNAME}
  tick:
    interval: ${TICK_INTERVAL}
