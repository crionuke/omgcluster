quarkus:
  datasource:
    devservices:
      container-env:
        "PAGER": "cat"
  log:
    category:
      "sh.byv":
        level: DEBUG
omgcluster:
  init:
    version: 2
  server:
    name: localhost
  state:
    prefix: omgstate
    sim-state:
      ttl: 10S
    zone-state:
      ttl: 10S
  tick:
    interval: 1000
