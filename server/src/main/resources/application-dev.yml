quarkus:
  datasource:
    devservices:
      container-env:
        "PAGER": "cat"
  log:
    category:
      "sh.byv":
        level: DEBUG
omgcluster:
  init:
    version: 2
  server:
    name: localhost
  sim-result:
    prefix: omgstate
    ttl: 10S
  zone-state:
    prefix: omgstate
    ttl: 10S
  tick:
    interval: 1000
