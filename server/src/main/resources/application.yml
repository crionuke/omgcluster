quarkus:
  application:
    name: omgcluster
  container-image:
    registry: ghcr.io
    group: crionuke
    name: omgcluster
    tag: latest
    additional-tags: ${quarkus.application.version}
    build: true
  log:
    console:
      format: "%d{yyyy-MM-dd HH:mm:ss} %-5p [%X{mdcId}] [%c{2.}] (%t) %s%e%n"
    category:
      "sh.byv":
        level: INFO
  quartz:
    store-type: jdbc-cmt
    clustered: true
  scheduler:
    use-composite-scheduler: true
    start-mode: forced
  flyway:
    migrate-at-start: true
    locations: db/migration
  hibernate-orm:
    database:
      start-offline: true
    mapping:
      format:
        global: ignore
  cache:
    redis:
      prefix: omgcache
      server-zones:
        ttl: 10S
      server-sims:
        ttl: 10S
      zone-sims:
        ttl: 10S
      cached-sim:
        ttl: 10S

